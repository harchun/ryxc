<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>日月星辰消費計算機</title>
<style>
body {
  font-family: 'Helvetica Neue', Arial, sans-serif;
  background: url('https://png.pngtree.com/thumb_back/fh260/background/20220314/pngtree-night-view-of-elements-of-sun-moon-stars-and-sky-image_1012325.jpg') no-repeat center center fixed;
  background-size: cover;
  padding: 10px 15px;
  margin: 0;
}

.container {
  max-width: 500px;
  width: 100%;
  margin: auto;
  background: rgba(255, 255, 255, 0.3);
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
  padding: 20px;
  border-radius: 20px;
  box-shadow: 0 8px 24px rgba(0,0,0,0.15);
  box-sizing: border-box;
}

input[type="number"] {
  width: calc(100% - 28px);
  padding: 14px;
  margin: 8px 0 12px;
  border-radius: 12px;
  border: 1px solid rgba(0,0,0,0.2);
  font-size: 16px;
  background: rgba(255,255,255,0.7);
  color: #000;
  box-sizing: border-box;
}
input[type="number"]:focus {
  border-color: #00bfff;
  box-shadow: 0 0 8px rgba(0,191,255,0.3);
  outline: none;
  background: rgba(255,255,255,0.8);
}

label {
  font-weight: bold;
  display: block;
  margin-bottom: 6px;
  font-size: 16px;
  color: #000;
}

hr {
  margin: 20px 0;
  border: none;
  border-top: 1px solid rgba(0,0,0,0.1);
}

/* 結果區 */
.result {
  border: 2px solid #00bfff;
  border-radius: 12px;
  padding: 12px;
  background: rgba(255,255,255,0.4);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  position: relative;
}

.result-note {
  display: block;
  font-size: 0.95em;
  font-weight: bold;
  color: #007acc;
  margin-bottom: 10px;
  padding: 4px 8px;
  border: 2px solid #00bfff;
  border-radius: 8px;
  background: rgba(173,216,230,0.3);
  text-align: center;
}

.result p {
  margin: 6px 0;
  font-size: 16px;
  color: #000;
}

.total {
  font-size: 1.4em;
  font-weight: bold;
  color: #00bfff;
  word-break: break-word;
}

.footer {
  text-align: center;
  margin-top: 18px;
  font-size: 0.9em;
}
.footer a {
  color: #00bfff;
  text-decoration: none;
}

@media (max-width: 400px) {
  body { padding: 10px; }
  .container { padding: 15px; }
  label, .result p { font-size: 15px; }
  input[type="number"] { width: calc(100% - 24px); font-size: 15px; padding: 12px; }
  .total { font-size: 1.2em; }
  .result-note { font-size: 0.85em; padding: 3px 6px; }
}
</style>
</head>
<body>
<div class="container">
  <h1 style="text-align:center; font-size: 1.6em; margin-bottom: 20px;">日月星辰底單計算機 🌙✨</h1>

  <label for="people">人數：</label>
  <input type="number" id="people" min="1" value="1">

  <label for="hours">消費時間（小時）：</label>
  <input type="number" id="hours" step="0.5" min="0.5" value="1">

  <label><input type="checkbox" id="lock"> 鎖台</label>
  <label><input type="checkbox" id="sit"> 二保一</label>

  <hr>

  <div class="result">
    <span class="result-note">備註：消費細項不含酒水</span>
    <p>👤 人頭費：<span id="headFee">0</span> 元</p>
    <p>🏠 包廂費：<span id="roomFee">0</span> 元</p>
    <p>🧑‍💼 少爺小費：<span id="tipFee">0</span> 元</p>
    <p>💃 公關檯費：<span id="publicFee">0</span> 元</p>
    <p>🔑 幹部訪台費用：<span id="vipFee">800</span> 元</p>
    <p>➕ 服務費（10%）：<span id="serviceFee">0</span> 元</p>
    <hr>
    <p class="total">總金額：<span id="total">0</span> 元</p>
    <p>平均每人：<span id="avg">0</span> 元</p>
  </div>

  <div class="footer">
    <a href="http://xiongds.com/" target="_blank">© 2025 熊半仙版權所有</a>
  </div>
</div>

<script>
const peopleInput = document.getElementById('people');
const hoursInput = document.getElementById('hours');
const lockInput = document.getElementById('lock');
const sitInput = document.getElementById('sit');

const headFeeEl = document.getElementById('headFee');
const roomFeeEl = document.getElementById('roomFee');
const tipFeeEl = document.getElementById('tipFee');
const publicFeeEl = document.getElementById('publicFee');
const vipFeeEl = document.getElementById('vipFee');
const serviceFeeEl = document.getElementById('serviceFee');
const totalEl = document.getElementById('total');
const avgEl = document.getElementById('avg');

// 鎖台與坐一轉只能二擇一
lockInput.addEventListener('change', () => {
  if (lockInput.checked) sitInput.checked = false;
  calculate();
});
sitInput.addEventListener('change', () => {
  if (sitInput.checked) lockInput.checked = false;
  calculate();
});

function calculate(){
  const people = Number(peopleInput.value);
  const hours = Number(hoursInput.value);
  const isLocked = lockInput.checked;
  const isSit = sitInput.checked;

  // 人頭費
  const headFee = 500 * people;

  // 少爺小費判定
  let tipFee = 0;
  if (people === 1) tipFee = 500;
  else if (people <= 6) tipFee = 1000;
  else tipFee = 1500;

  // 包廂費判定
  let roomFee = 0;
  if (people <= 4) roomFee = 2000;
  else if (people <= 7) roomFee = 2500;
  else if (people <= 9) roomFee = 3000;
  else roomFee = 3500;

  // 公關檯費（鎖台 or 坐一轉 二擇一）
  let publicRate = 1320; // 預設正常價
  if (isLocked) publicRate = 2400;
  else if (isSit) publicRate = 2640;

  const publicFee = people * publicRate * hours;

  const vipFee = 800;
  const subtotal = headFee + roomFee + tipFee + publicFee + vipFee;
  const serviceFee = subtotal * 0.1;
  const total = subtotal + serviceFee;
  const avg = Math.round(total / people);

  // 顯示數值
  headFeeEl.textContent = headFee.toLocaleString();
  roomFeeEl.textContent = roomFee.toLocaleString();
  tipFeeEl.textContent = tipFee.toLocaleString();
  publicFeeEl.textContent = publicFee.toLocaleString();
  vipFeeEl.textContent = vipFee.toLocaleString();
  serviceFeeEl.textContent = serviceFee.toLocaleString();
  totalEl.textContent = total.toLocaleString();
  avgEl.textContent = avg.toLocaleString();
}

peopleInput.addEventListener('input', calculate);
hoursInput.addEventListener('input', calculate);
calculate();
</script>

</body>
</html>
